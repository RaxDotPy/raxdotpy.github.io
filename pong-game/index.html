<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🏓 PONG GAME</h1>
        
        <div class="scoreboard">
            <div class="player-score">
                <div class="label">PLAYER</div>
                <div id="playerScore" class="score">0</div>
            </div>
            <div class="vs">VS</div>
            <div class="computer-score">
                <div class="label">COMPUTER</div>
                <div id="computerScore" class="score">0</div>
            </div>
        </div>

        <canvas id="pongCanvas" width="800" height="400"></canvas>

        <div class="controls">
            <p>🖱️ <strong>Mouse:</strong> Move cursor up/down to control left paddle</p>
            <p>⬆️⬇️ <strong>Arrow Keys:</strong> Use Up/Down arrows to control left paddle</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
